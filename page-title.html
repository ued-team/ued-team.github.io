<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026-q2 Tour 行前/中 關懷 — Wireframe</title>
<link rel="stylesheet" href="tokens.css">
<style>
  :root {
    --color-bg-primary-medium: #26BEC9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #ffffff;
    font-family: "PingFang TC", -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .page-title {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    width: 100%;
    height: 100%;
  }

  /* 主要白色內容區 */
  .page-title__body {
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 96px 120px;
    background: #ffffff;
    border-radius: 48px 48px 0 0;
    width: 100%;
    flex: 1;
  }

  /* 左側文字區 */
  .page-title__text {
    display: flex;
    flex-direction: column;
    gap: 30px;
    flex: 1 0 0;
    min-width: 0;
  }

  .page-title__subtitle {
    color: #666666;
    font-size: 60px;
    font-weight: 600;         /* Semibold */
    line-height: 70px;
    font-style: normal;
    width: 100%;
  }

  .page-title__title {
    color: #000000;
    font-size: 100px;
    font-weight: 600;         /* Semibold */
    line-height: 120px;
    font-style: normal;
    width: 100%;
  }

  /* 右側 badge */
  .page-title__badge {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 40px;
    background: var(--color-bg-primary-medium); /* #26BEC9 */
    border-radius: 10px;
    flex-shrink: 0;
  }

  .page-title__badge-text {
    color: #ffffff;
    font-size: 50px;
    font-weight: 600;         /* Semibold */
    line-height: 60px;
    font-style: normal;
    text-align: right;
    white-space: nowrap;
  }

  /* 底部 teal bar */
  .page-title__bar {
    width: 100%;
    height: 30px;
    background: var(--color-bg-primary-medium); /* #26BEC9 */
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="page-title">
    <div class="page-title__body">
      <div class="page-title__text">
        <p class="page-title__subtitle">2026-q2 Tour 行前/中 關懷</p>
        <p class="page-title__title">Wireframe</p>
      </div>
      <div class="page-title__badge">
        <span class="page-title__badge-text">Completed</span>
      </div>
    </div>
    <div class="page-title__bar"></div>
  </div>
</body>
</html>
